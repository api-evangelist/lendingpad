aid: lendingpad
url: https://raw.githubusercontent.com/api-evangelist/lendingpad/refs/heads/main/apis.yml
name: LendingPad
kind: company
description: LendingPad is a cloud-based mortgage loan origination system (LOS) that
  lets brokers, lenders, and institutions originate, process, underwrite, close, and
  fund residential mortgage loans with real-time, multi-user collaboration across
  the borrower, broker, lender, and service-provider lifecycle. It ships in Broker,
  Lender, Processing, and Institution editions and runs a large Partners Marketplace
  of integrated vendors (credit, AUS, AVM/appraisal, title, compliance, doc-prep,
  pricing/PPE, POS, CRM, and investors such as Fannie Mae, Freddie Mac, UWM, and
  Rocket Mortgage). LendingPad exposes an Enterprise API for loan data exchange, but
  access is gated - it is limited to Lender Edition clients under an executed API
  Agreement and NDA, keys and testing-site access are issued by the support desk,
  and there is no public developer portal or self-serve API reference. The API
  entries below are honestly modeled from the vendor-integration and marketplace
  capabilities LendingPad describes publicly; endpoint-level surfaces are not
  published and are not fabricated here.
