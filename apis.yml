apis:
- aid: lendingpad:lendingpad-loans-api
  name: LendingPad Loans API (modeled)
  tags:
  - Loans
  - Loan Files
  - MISMO
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://lendingpad.com/partners-marketplace
  properties:
  - url: https://lendingpad.com/api-terms
    type: Documentation
  - url: https://lendingpad.com/partners-marketplace
    type: PartnerProgram
  endpointsModeled: true
  description: Modeled loan-file exchange surface - create, read, and update mortgage
    loan files, submit loan data to lenders/investors, and import/export loan data
    (LendingPad describes MISMO-style 3.2/3.4 loan-data exchange with partners, with
    import/export throttled to 30-minute intervals per the API Terms). No public
    endpoint reference is published; access is gated to Lender Edition clients under
    an executed API Agreement.
- aid: lendingpad:lendingpad-documents-conditions-api
  name: LendingPad Documents & Conditions API (modeled)
  tags:
  - Documents
  - Conditions
  - eSign
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://lendingpad.com/partners-marketplace
  properties:
  - url: https://lendingpad.com/api-terms
    type: Documentation
  - url: https://kb.lendingpad.com/integrations
    type: Documentation
  endpointsModeled: true
  description: Modeled document and condition exchange surface - push borrower and
    loan documents into the LendingPad LOS (as POS/doc-prep partners like Floify and
    DocMagic do) and manage underwriting conditions and disclosures. Publicly
    described as a partner capability; no documented endpoints. Gated access.
- aid: lendingpad:lendingpad-pricing-eligibility-api
  name: LendingPad Pricing & Product Eligibility API (modeled)
  tags:
  - Pricing
  - Product Eligibility
  - PPE
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://lendingpad.com/partners-marketplace
  properties:
  - url: https://lendingpad.com/partners-marketplace
    type: PartnerProgram
  endpointsModeled: true
  description: Modeled product, pricing, and eligibility (PPE) exchange surface -
    integrations with pricing engines such as Polly, Lender Price, Optimal Blue, and
    LoanNex return real-time product and pricing results into the loan file.
    Delivered as marketplace integrations rather than a public developer API.
- aid: lendingpad:lendingpad-webhooks-events-api
  name: LendingPad Webhooks & Events (modeled)
  tags:
  - Webhooks
  - Events
  - Loan Status
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://lendingpad.com/partners-marketplace
  properties:
  - url: https://lendingpad.com/api-terms
    type: Documentation
  endpointsModeled: true
  description: Modeled event/notification surface - partner integrations describe
    synchronization of field updates, critical dates, and loan-status changes back
    to external systems (e.g. Shape's bi-directional sync). No public webhook or
    event reference is documented; behavior is inferred from partner integrations.
